{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Tienda de Videojuegos{% endblock %}</title>

        <!-- CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-.." crossorigin="anonymous">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">

        <!-- Font Awesome -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'js/script.js' %}"></script>
    </head>

    <body class="bg-body text-body">

        <!-- Botón modo oscuro -->
        <header class="d-flex justify-content-between aling-items-center p-3 border-borrom">
                <!-- Botón modo oscuro -->
                 <button id="toggle-theme" 
                    class="btn btn-outline-light rounded-circle shadow-sm order-2 ms-auto me-2 me-lg-0">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
        </header>

        {% block content %}
        <!-- Contenido especifico de la pagina -->
        {% endblock %}

        <!-- Footer -->
        <footer class="text-center mt-5">
            <p>Hecho por Sebastian Alvarez &copy; 2026</p>
            <a href="{% url 'home' %}" class="text-body">Inicio</a>
            <A href="{% url 'contacto' %}" class="text-body" ms-3>Contacto</A>
        </footer>
    </body>
</html>
